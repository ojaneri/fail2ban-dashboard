<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fail2Ban SOC Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soc-dark': '#0a0e17',
                        'soc-panel': '#111827',
                        'soc-card': '#1a2234',
                        'soc-border': '#2d3748',
                        'soc-cyan': '#06b6d4',
                        'soc-cyan-dark': '#0891b2',
                        'soc-red': '#ef4444',
                        'soc-red-dark': '#dc2626',
                        'soc-green': '#10b981',
                        'soc-yellow': '#f59e0b',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1a2e 100%);
            min-height: 100vh;
        }
        
        .glow-cyan {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        
        .glow-red {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
        
        .stat-card {
            background: linear-gradient(145deg, #1a2234 0%, #111827 100%);
            border: 1px solid #2d3748;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #06b6d4;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
        }
        
        .panel {
            background: linear-gradient(145deg, #1a2234 0%, #111827 100%);
            border: 1px solid #2d3748;
        }
        
        .leaflet-container {
            background: #111827;
            border-radius: 8px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a2234;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #06b6d4;
        }
        
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        .scan-line {
            animation: scan 3s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        // Country coordinates mapping
        const country_coordinates = {
            'CN': [35.8617, 104.1954],
            'US': [37.0902, -95.7129],
            'RU': [61.5240, 105.3188],
            'BR': [-14.2350, -51.9253],
            'IN': [20.5937, 78.9629],
            'DE': [51.1657, 10.4515],
            'FR': [46.2276, 2.2137],
            'NL': [52.1326, 5.2913],
            'UA': [48.3794, 31.1656],
            'VN': [14.0583, 108.2772],
            'RO': [45.9432, 24.9668],
            'PL': [51.9194, 19.1451],
            'KR': [35.9078, 127.7669],
            'JP': [36.2048, 138.2529],
            'GB': [55.3781, -3.4360],
            'ID': [-0.7893, 113.9213],
            'TR': [38.9637, 35.2433],
            'IT': [41.8719, 12.5674],
            'ES': [40.4637, -3.7492],
            'AR': [-38.4161, -63.6167],
            'CO': [4.5709, -74.2973],
            'CL': [-35.6751, -71.5430],
            'MX': [23.6345, -102.5528],
            'CA': [56.1304, -106.3468],
            'AU': [-25.2744, 133.7751],
            'TH': [15.8700, 100.9925],
            'NG': [9.0820, 8.6753],
            'ZA': [-30.5595, 22.9375],
            'EG': [26.8206, 30.8025],
            'PK': [30.3753, 69.3451],
            'IR': [32.4279, 53.6880],
            'HK': [22.3193, 114.1694],
            'TW': [23.6978, 120.9605],
            'SG': [1.3521, 103.8198],
            'AE': [23.4241, 53.8478],
            'SA': [23.8859, 45.0792],
        };
        
        // Empty data structure
        const empty_data = {
            overview: {
                total_bans: 0,
                today_bans: 0,
                week_bans: 0,
                active_bans: 0,
                top_countries: [],
                jails: []
            },
            attacks_over_time: { data: [] },
            top_countries: [],
            heatmap_data: { heatmap: [] },
            banned_ips: { total: 0, ips: [] }
        };
        
        // API functions
        // Fetch data from API (no fallback)
        async function fetch_api(endpoint) {
            try {
                // Use /dashboard/api prefix since the app is served from /dashboard/
                const baseUrl = '/dashboard';
                const response = await fetch(`${baseUrl}${endpoint}`, {
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error(`API error for ${endpoint}:`, error);
                return null;
            }
        }
        
        // Helper functions
        function format_bytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function format_uptime(seconds) {
            if (!seconds) return '0s';
            const d = Math.floor(seconds / (3600 * 24));
            const h = Math.floor((seconds % (3600 * 24)) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            
            const parts = [];
            if (d > 0) parts.push(`${d}d`);
            if (h > 0) parts.push(`${h}h`);
            if (m > 0) parts.push(`${m}m`);
            if (s > 0 || parts.length === 0) parts.push(`${s}s`);
            
            return parts.join(' ');
        }

        // System Stats Gauge Component
        function SystemGauge({ title, value, icon, color, subtext }) {
            const radius = 40;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (value / 100) * circumference;
            const colorClass = value > 80 ? 'text-red-500' : value > 60 ? 'text-yellow-500' : color;
            
            return (
                <div className="stat-card rounded-xl p-4 flex flex-col items-center">
                    <p className="text-gray-400 text-sm mb-2">{title}</p>
                    <div className="relative w-24 h-24">
                        <svg className="w-full h-full transform -rotate-90">
                            <circle
                                cx="48" cy="48" r={radius}
                                stroke="#2d3748" strokeWidth="8" fill="none"
                            />
                            <circle
                                cx="48" cy="48" r={radius}
                                stroke="currentColor" strokeWidth="8" fill="none"
                                strokeLinecap="round"
                                strokeDasharray={circumference}
                                strokeDashoffset={offset}
                                className={colorClass}
                            />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center">
                            <span className="text-2xl font-bold text-white">{Math.round(value)}%</span>
                        </div>
                    </div>
                    {subtext && <p className="text-xs text-gray-500 mt-2">{subtext}</p>}
                    <i className={`${icon} mt-2 text-xl text-gray-400`}></i>
                </div>
            );
        }

        function SystemInfo({ system }) {
            if (!system) return null;
            
            return (
                <div className="stat-card rounded-xl p-4 flex flex-col gap-3">
                    <h3 className="text-gray-400 text-sm font-medium border-b border-soc-border pb-2">System Information</h3>
                    <div className="grid grid-cols-2 gap-2 text-xs">
                        <div className="flex flex-col">
                            <span className="text-gray-500 uppercase tracking-wider">Uptime</span>
                            <span className="text-white font-mono">{format_uptime(system.uptime)}</span>
                        </div>
                        <div className="flex flex-col">
                            <span className="text-gray-500 uppercase tracking-wider">Load Avg</span>
                            <span className="text-white font-mono">{system.cpu?.load_avg?.map(l => l.toFixed(2)).join(', ')}</span>
                        </div>
                        <div className="flex flex-col">
                            <span className="text-gray-500 uppercase tracking-wider">CPU Cores</span>
                            <span className="text-white font-mono">{system.cpu?.count}</span>
                        </div>
                        <div className="flex flex-col">
                            <span className="text-gray-500 uppercase tracking-wider">Disk Free</span>
                            <span className="text-white font-mono">{format_bytes(system.disk?.free)} / {format_bytes(system.disk?.total)}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // WebSocket setup function with exponential backoff
        function setup_websocket(onMessage, onStatusChange, _attempt = 0) {
            const MAX_ATTEMPTS = 5;
            const BASE_DELAY = 5000;

            if (_attempt >= MAX_ATTEMPTS) {
                // Stop retrying — polling fallback is sufficient
                return { close: () => {} };
            }

            try {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws_url = `${protocol}//${window.location.host}/dashboard/ws`;
                const socket = new WebSocket(ws_url);
                let closed = false;

                socket.onopen = () => {
                    _attempt = 0;
                    onStatusChange('connected');
                };

                socket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        onMessage(data);
                    } catch (e) {}
                };

                socket.onclose = () => {
                    if (closed) return;
                    closed = true;
                    const delay = BASE_DELAY * Math.pow(2, _attempt);
                    setTimeout(() => setup_websocket(onMessage, onStatusChange, _attempt + 1), delay);
                };

                socket.onerror = () => {
                    if (!closed) socket.close();
                };

                return socket;
            } catch (e) {
                return { close: () => {} };
            }
        }
        
        // Header Component
        function Header({ lastUpdate, status, timeRange, setTimeRange, onRefresh }) {
            return (
                <header className="bg-soc-panel border-b border-soc-border px-6 py-4">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-gradient-to-br from-soc-cyan to-blue-600 rounded-lg flex items-center justify-center glow-cyan">
                                <i className="fas fa-shield-halved text-2xl text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-white tracking-wide">
                                    <span className="text-soc-cyan">Fail2Ban</span> SOC Dashboard
                                </h1>
                                <p className="text-gray-400 text-sm">Security Operations Center - Real-time Monitoring</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="text-right">
                                <div className="flex items-center gap-2 justify-end">
                                    <span className={`w-2 h-2 rounded-full ${status === 'connected' ? 'bg-soc-green pulse-dot' : status === 'loading' ? 'bg-yellow-500' : status === 'no_data' ? 'bg-orange-500' : 'bg-soc-red'}`}></span>
                                    <span className="text-sm text-gray-300">{status === 'connected' ? 'API Online' : status === 'loading' ? 'Carregando...' : status === 'no_data' ? 'Aguardando Dados' : 'Erro'}</span>
                                </div>
                                <p className="text-xs text-gray-500 mt-1">Last update: {lastUpdate}</p>
                            </div>
                            <select
                                value={timeRange}
                                onChange={(e) => {
                                    setTimeRange(e.target.value);
                                    onRefresh(e.target.value);
                                }}
                                className="bg-soc-card border border-soc-border text-white px-3 py-2 rounded-lg text-sm mr-2"
                            >
                                <option value="1">Today</option>
                                <option value="7">7 Days</option>
                                <option value="30">30 Days</option>
                                <option value="90">90 Days</option>
                                <option value="all">All Time</option>
                            </select>
                            <button
                                onClick={() => onRefresh(timeRange)}
                                className="bg-soc-cyan hover:bg-soc-cyan-dark text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
                            >
                                <i className="fas fa-sync-alt"></i>
                                Refresh
                            </button>
                        </div>
                    </div>
                </header>
            );
        }
        
        // Stat Card Component
        function StatCard({ title, value, icon, color, subtext }) {
            return (
                <div className="stat-card rounded-xl p-5">
                    <div className="flex items-start justify-between">
                        <div>
                            <p className="text-gray-400 text-sm mb-1">{title}</p>
                            <p className="text-3xl font-bold text-white">{value.toLocaleString()}</p>
                            {subtext && <p className="text-xs text-gray-500 mt-1">{subtext}</p>}
                        </div>
                        <div className={`w-12 h-12 rounded-lg flex items-center justify-center ${color}`}>
                            <i className={`${icon} text-xl text-white`}></i>
                        </div>
                    </div>
                </div>
            );
        }
        
        // World Map Component
        function WorldMap({ data }) {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            
            useEffect(() => {
                if (!mapRef.current || mapInstanceRef.current) return;
                
                mapInstanceRef.current = L.map(mapRef.current, {
                    center: [20, 0],
                    zoom: 2,
                    zoomControl: true,
                    attributionControl: false
                });
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19
                }).addTo(mapInstanceRef.current);
                
                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, []);
            
            useEffect(() => {
                if (!mapInstanceRef.current || !data) return;
                
                // Clear existing markers
                mapInstanceRef.current.eachLayer((layer) => {
                    if (layer instanceof L.CircleMarker) {
                        mapInstanceRef.current.removeLayer(layer);
                    }
                });
                
                // Add markers (filter out null countries)
                const validData = (data || []).filter(d => d.country && d.total_attacks);
                const maxAttacks = Math.max(...validData.map(d => d.total_attacks || 0), 1);
                
                validData.forEach((country, index) => {
                    const coords = country_coordinates[country.country];
                    if (!coords) return;
                    
                    const intensity = country.total_attacks / maxAttacks;
                    const radius = 8 + (intensity * 25);
                    
                    // Color gradient from green to red
                    const r = Math.round(255 * intensity);
                    const g = Math.round(255 * (1 - intensity));
                    const color = `rgb(${r}, ${g}, 0)`;
                    
                    const marker = L.circleMarker(coords, {
                        radius: radius,
                        fillColor: color,
                        color: '#fff',
                        weight: 1,
                        opacity: 0.8,
                        fillOpacity: 0.7
                    });
                    
                    marker.bindTooltip(`
                        <div class="text-center">
                            <strong class="text-white">${country.country_name}</strong><br/>
                            <span class="text-cyan-400">${country.total_attacks.toLocaleString()} attacks</span><br/>
                            <span class="text-gray-400">${country.unique_ips} unique IPs</span>
                        </div>
                    `, {
                        className: 'bg-soc-card border border-soc-border rounded-lg p-2',
                        direction: 'top'
                    });
                    
                    marker.addTo(mapInstanceRef.current);
                });
            }, [data]);
            
            return (
                <div className="panel rounded-xl p-4 h-full">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-lg font-semibold text-white flex items-center gap-2">
                            <i className="fas fa-globe text-soc-cyan"></i>
                            Attack Origins Map
                        </h3>
                        <div className="flex items-center gap-2 text-xs">
                            <span className="text-gray-400">Intensity:</span>
                            <div className="flex items-center gap-1">
                                <div className="w-3 h-3 rounded-full bg-green-500"></div>
                                <span className="text-gray-400">Low</span>
                            </div>
                            <div className="flex items-center gap-1">
                                <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                                <span className="text-gray-400">Med</span>
                            </div>
                            <div className="flex items-center gap-1">
                                <div className="w-3 h-3 rounded-full bg-red-500"></div>
                                <span className="text-gray-400">High</span>
                            </div>
                        </div>
                    </div>
                    <div ref={mapRef} className="h-[300px] rounded-lg overflow-hidden"></div>
                </div>
            );
        }
        
        // Heatmap Panel Component
        function HeatmapPanel({ data }) {
            // Safety check: ensure data exists and is an array
            if (!data || !Array.isArray(data) || data.length === 0) {
                return (
                    <div className="panel rounded-xl p-4">
                        <h3 className="text-lg font-semibold text-white flex items-center gap-2 mb-4">
                            <i className="fas fa-fire text-soc-red"></i>
                            Attack Intensity Heatmap
                        </h3>
                        <div className="h-[300px] flex items-center justify-center text-gray-500">
                            Aguardando dados...
                        </div>
                    </div>
                );
            }
            
            const maxAttacks = Math.max(...data.map(d => d.total_attacks || 1));
            
            return (
                <div className="panel rounded-xl p-4">
                    <h3 className="text-lg font-semibold text-white flex items-center gap-2 mb-4">
                        <i className="fas fa-fire text-soc-red"></i>
                        Attack Intensity Heatmap
                    </h3>
                    <div className="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                        {(data || []).filter(d => d.country_name).slice(0, 15).map((country, index) => {
                            const total = country.total_attacks || 0;
                            const percentage = (total / maxAttacks) * 100;
                            const color = `rgb(${Math.round(239 * (percentage / 100))}, ${Math.round(68 * (1 - percentage / 100))}, ${Math.round(68 * (1 - percentage / 100))})`;
                            
                            return (
                                <div key={country.country} className="flex items-center gap-3">
                                    <span className="text-gray-400 text-sm w-6">{index + 1}</span>
                                    <span className="text-white text-sm w-24 truncate">{country.country_name}</span>
                                    <div className="flex-1 h-6 bg-soc-dark rounded overflow-hidden relative">
                                        <div 
                                            className="h-full rounded transition-all duration-500"
                                            style={{ 
                                                width: `${percentage}%`,
                                                background: `linear-gradient(90deg, #064e3b 0%, ${color} 100%)`
                                            }}
                                        ></div>
                                        <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-white font-mono">
                                            {total.toLocaleString()}
                                        </span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }
        
        // Line Chart Component
        function AttacksLineChart({ data, timeRange }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            
            useEffect(() => {
                if (!canvasRef.current || !data) return;
                
                if (chartRef.current) {
                    chartRef.current.destroy();
                }
                
                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: (data || []).map(d => d.period || ''),
                        datasets: [{
                            label: 'Attacks',
                            data: (data || []).map(d => d.count || 0),
                            borderColor: '#06b6d4',
                            backgroundColor: 'rgba(6, 182, 212, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#06b6d4',
                            pointBorderColor: '#fff',
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                grid: { color: '#2d3748' },
                                ticks: { color: '#9ca3af' }
                            },
                            y: {
                                grid: { color: '#2d3748' },
                                ticks: { color: '#9ca3af' }
                            }
                        }
                    }
                });
                
                return () => {
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }
                };
            }, [data]);
            
            return (
                <div className="panel rounded-xl p-4">
                    <h3 className="text-lg font-semibold text-white flex items-center gap-2 mb-4">
                        <i className="fas fa-chart-line text-soc-cyan"></i>
                        Attacks Over Time ({timeRange === 'all' ? 'All Time' : timeRange === '1' ? 'Today' : `${timeRange} Days`})
                    </h3>
                    <div className="h-[250px]">
                        <canvas ref={canvasRef}></canvas>
                    </div>
                </div>
            );
        }
        
        // Bar Chart Component
        function TopCountriesBarChart({ data }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            
            useEffect(() => {
                if (!canvasRef.current || !data) return;
                
                if (chartRef.current) {
                    chartRef.current.destroy();
                }
                
                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: (data || []).filter(d => d.country_name).slice(0, 10).map(d => (d.country_name || 'N/A').substring(0, 10)),
                        datasets: [{
                            label: 'Attacks',
                            data: (data || []).filter(d => d.country_name).slice(0, 10).map(d => d.total_attacks || 0),
                            backgroundColor: [
                                '#ef4444',
                                '#f97316',
                                '#f59e0b',
                                '#eab308',
                                '#84cc16',
                                '#22c55e',
                                '#14b8a6',
                                '#06b6d4',
                                '#0ea5e9',
                                '#3b82f6'
                            ],
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                grid: { color: '#2d3748' },
                                ticks: { color: '#9ca3af' }
                            },
                            y: {
                                grid: { display: false },
                                ticks: { color: '#9ca3af' }
                            }
                        }
                    }
                });
                
                return () => {

        // Helper functions
        function get_country_flag(countryCode) {
            if (!countryCode) return '🌍';
            const codePoints = countryCode
                .toUpperCase()
                .split('')
                .map(char => 127397 + char.charCodeAt(0));
            return String.fromCodePoint(...codePoints);
        }
        
        function format_time(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        function format_current_time() {
            return new Date().toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }
        
        // Main App Component
        function App() {
            const [loading, setLoading] = useState(true);
            const [timeRange, setTimeRange] = useState('7'); // days: 1, 7, 30, 90, all
            const [error, setError] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(format_current_time());
            const [status, setStatus] = useState('loading');
            const [selectedIP, setSelectedIP] = useState(null);

            // Ref always holds the latest timeRange — intervals read from this
            const timeRangeRef = useRef('7');

            // Stable refs to latest polling functions (avoids stale closure in setInterval)
            const pollOverviewRef = useRef(null);
            const pollBannedRef = useRef(null);
            const pollAttacksRef = useRef(null);
            const pollCountriesRef = useRef(null);
            const pollHeatmapRef = useRef(null);
            const pollSystemRef = useRef(null);
            const [data, setData] = useState({
                overview: null,
                attacks_over_time: null,
                top_countries: null,
                heatmap_data: null,
                banned_ips: null,
                system: null
            });
            
            // Individual fetch functions for segmented polling
            // Keep timeRangeRef in sync with state so intervals always read the latest value
            timeRangeRef.current = timeRange;

            const dp = (d) => (d === 'all' ? '36500' : d);

            const fetch_overview = async (days) => {
                const d = dp(days !== undefined ? days : timeRangeRef.current);
                try {
                    const overview = await fetch_api(`/api/stats/overview?days=${d}`);
                    if (overview) { setData(prev => ({ ...prev, overview })); setStatus('connected'); }
                } catch (err) {}
            };
            pollOverviewRef.current = fetch_overview;

            const fetch_banned_ips = async (days) => {
                const d = dp(days !== undefined ? days : timeRangeRef.current);
                try {
                    const bannedIps = await fetch_api(`/api/banned-ips?limit=20&days=${d}`);
                    if (bannedIps) { setData(prev => ({ ...prev, banned_ips: bannedIps })); setStatus('connected'); }
                } catch (err) {}
            };
            pollBannedRef.current = fetch_banned_ips;

            const fetch_attacks_over_time = async (days) => {
                const d = dp(days !== undefined ? days : timeRangeRef.current);
                try {
                    const attacksOverTime = await fetch_api(`/api/stats/attacks-over-time?days=${d}&interval=day`);
                    if (attacksOverTime) { setData(prev => ({ ...prev, attacks_over_time: attacksOverTime })); setStatus('connected'); }
                } catch (err) {}
            };
            pollAttacksRef.current = fetch_attacks_over_time;

            const fetch_top_countries = async (days) => {
                const d = dp(days !== undefined ? days : timeRangeRef.current);
                try {
                    const topCountries = await fetch_api(`/api/stats/top-countries?limit=10&days=${d}`);
                    if (topCountries) { setData(prev => ({ ...prev, top_countries: topCountries })); setStatus('connected'); }
                } catch (err) {}
            };
            pollCountriesRef.current = fetch_top_countries;

            const fetch_heatmap_data = async (days) => {
                const d = dp(days !== undefined ? days : timeRangeRef.current);
                try {
                    const heatmapData = await fetch_api(`/api/stats/heatmap-data?days=${d}`);
                    if (heatmapData) { setData(prev => ({ ...prev, heatmap_data: heatmapData })); setStatus('connected'); }
                } catch (err) {}
            };
            pollHeatmapRef.current = fetch_heatmap_data;

            const fetch_system_stats = async () => {
                try {
                    const systemData = await fetch_api('/api/stats/system');
                    if (systemData) { setData(prev => ({ ...prev, system: systemData })); }
                } catch (err) {}
            };
            pollSystemRef.current = fetch_system_stats;
            
            // Combined fetch for initial load
            const fetch_all_data = async (days = timeRangeRef.current) => {
                timeRangeRef.current = days;
                try {
                    setLoading(true);

                    // Handle 'all' as a very large number
                    const daysParam = days === 'all' ? '36500' : days;
                    
                    const [overview, attacksOverTime, topCountries, heatmapData, bannedIps] = await Promise.all([
                        fetch_api(`/api/stats/overview?days=${daysParam}`),
                        fetch_api(`/api/stats/attacks-over-time?days=${daysParam}&interval=day`),
                        fetch_api(`/api/stats/top-countries?limit=10&days=${daysParam}`),
                        fetch_api(`/api/stats/heatmap-data?days=${daysParam}`),
                        fetch_api(`/api/banned-ips?limit=20&days=${daysParam}`)
                    ]);
                    
                    // Only update data if we got valid responses
                    if (overview && overview.total_bans > 0) {
                        setData(prev => ({ ...prev, overview }));
                        setStatus('connected');
                    } else {
                        setStatus('no_data');
                    }
                    if (attacksOverTime) setData(prev => ({ ...prev, attacks_over_time: attacksOverTime }));
                    if (topCountries) setData(prev => ({ ...prev, top_countries: topCountries }));
                    if (heatmapData) setData(prev => ({ ...prev, heatmap_data: heatmapData }));
                    if (bannedIps) setData(prev => ({ ...prev, banned_ips: bannedIps }));
                    
                    setLastUpdate(format_current_time());
                    setError(null);
                } catch (err) {
                    console.error('Error fetching data:', err);
                    // Keep previous status if we have data, otherwise show no_data
                    if (!data.overview) {
                        setStatus('no_data');
                    }
                    // Don't show error if we have data from before
                } finally {
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                fetch_all_data();
                fetch_system_stats();

                const socket = setup_websocket((message) => {
                    if (message.type === 'new_entries') {
                        pollOverviewRef.current();
                        pollBannedRef.current();
                    }
                }, setStatus);

                // Intervals call via ref — always use the latest closure with current timeRange
                const intervalOverview   = setInterval(() => pollOverviewRef.current(),  10000);
                const intervalCountries  = setInterval(() => pollCountriesRef.current(),  15000);
                const intervalHeatmap    = setInterval(() => pollHeatmapRef.current(),    15000);
                const intervalAttacks    = setInterval(() => pollAttacksRef.current(),    30000);
                const intervalBanned     = setInterval(() => pollBannedRef.current(),     30000);
                const intervalSystem     = setInterval(() => pollSystemRef.current(),      5000);
                const intervalTimestamp  = setInterval(() => setLastUpdate(format_current_time()), 10000);

                return () => {
                    socket.close();
                    clearInterval(intervalOverview);
                    clearInterval(intervalCountries);
                    clearInterval(intervalHeatmap);
                    clearInterval(intervalAttacks);
                    clearInterval(intervalBanned);
                    clearInterval(intervalSystem);
                    clearInterval(intervalTimestamp);
                };
            }, []);
            
            if (error && !data.overview) {
                return (
                    <div className="min-h-screen bg-soc-dark flex flex-col items-center justify-center p-6">
                        <div className="w-16 h-16 bg-soc-red rounded-lg flex items-center justify-center mb-6 glow-red">
                            <i className="fas fa-exclamation-triangle text-2xl text-white"></i>
                        </div>
                        <h1 className="text-2xl font-bold text-white mb-2">Connection Error</h1>
                        <p className="text-gray-400 mb-6 text-center max-w-md">{error}</p>
                        <button 
                            onClick={fetch_all_data}
                            className="bg-soc-cyan hover:bg-soc-cyan-dark text-white px-6 py-2 rounded-lg transition-colors"
                        >
                            Retry Connection
                        </button>
                    </div>
                );
            }
            
            return (
                <div className="min-h-screen">
                    <Header lastUpdate={lastUpdate} status={status} timeRange={timeRange} setTimeRange={setTimeRange} onRefresh={fetch_all_data} />
                    
                    <main className="p-6">
                        {/* System Stats Row */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                            <SystemGauge 
                                title="CPU Usage" 
                                value={data.system?.cpu?.percent || 0} 
                                icon="fas fa-microchip" 
                                color="text-soc-cyan"
                                subtext={`${data.system?.cpu?.count || 0} Cores`}
                            />
                            <SystemGauge 
                                title="Memory Usage" 
                                value={data.system?.memory?.percent || 0} 
                                icon="fas fa-memory" 
                                color="text-soc-cyan"
                                subtext={`${format_bytes(data.system?.memory?.used)} / ${format_bytes(data.system?.memory?.total)}`}
                            />
                            <SystemGauge 
                                title="Swap Usage" 
                                value={data.system?.swap?.percent || 0} 
                                icon="fas fa-exchange-alt" 
                                color="text-soc-cyan"
                                subtext={`${format_bytes(data.system?.swap?.used)} / ${format_bytes(data.system?.swap?.total)}`}
                            />
                            <SystemGauge 
                                title="Disk Usage" 
                                value={data.system?.disk?.percent || 0} 
                                icon="fas fa-hdd" 
                                color="text-soc-cyan"
                                subtext={`${format_bytes(data.system?.disk?.used)} / ${format_bytes(data.system?.disk?.total)}`}
                            />
                            <SystemInfo system={data.system} />
                        </div>
                        
                        {/* Stats Cards Row */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <StatCard 
                                title="Total Bans" 
                                value={data.overview?.total_bans || 0} 
                                icon="fas fa-shield-virus" 
                                color="bg-gradient-to-br from-red-500 to-red-700"
                                subtext="All time"
                            />
                            <StatCard 
                                title="Today" 
                                value={data.overview?.today_bans || 0} 
                                icon="fas fa-calendar-day" 
                                color="bg-gradient-to-br from-orange-500 to-orange-700"
                                subtext="Last 24 hours"
                            />
                            <StatCard 
                                title={data.overview?.period_label || 'Period'} 
                                value={data.overview?.period_bans || 0} 
                                icon="fas fa-calendar-week" 
                                color="bg-gradient-to-br from-yellow-500 to-yellow-700"
                                subtext="Filtered period"
                            />
                            <StatCard 
                                title="Active Countries" 
                                value={data.overview?.top_countries?.length || data.top_countries?.countries?.length || 0} 
                                icon="fas fa-globe-americas" 
                                color="bg-gradient-to-br from-soc-cyan to-blue-600"
                                subtext="Source countries"
                            />
                        </div>
                        
                        {/* Map and Heatmap Row */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            <WorldMap data={data.heatmap_data?.heatmap || data.heatmap_data || []} />
                            <HeatmapPanel data={data.heatmap_data?.heatmap || data.heatmap_data || []} />
                        </div>
                        
                        {/* Charts Row */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                            <AttacksLineChart data={data.attacks_over_time?.data || []} timeRange={timeRange} />
                            <TopCountriesBarChart data={data.top_countries?.countries || data.top_countries || []} />
                            <JailsPieChart data={data.overview?.jails || []} />
                        </div>
                        
                        {/* Recent Bans Table */}
                        <RecentBansTable
                            data={data.banned_ips?.ips ? { ips: data.banned_ips.ips } : data.banned_ips}
                            loading={loading}
                            onViewDetails={(entry) => setSelectedIP(entry)}
                        />

                        {/* IP Detail Modal */}
                        {selectedIP && <IPDetailModal entry={selectedIP} onClose={() => setSelectedIP(null)} />}
                        
                        {/* Footer */}
                        <footer className="mt-6 text-center text-gray-500 text-sm">
                            <p>Fail2Ban SOC Dashboard &copy; 2026 | Powered by React & Leaflet</p>
                        </footer>
                    </main>
                </div>
            );
        }
        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
